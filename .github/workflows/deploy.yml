name: Build and Deploy TruLoad Backend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.sync.outputs.result }}
    steps:
      - name: Check and sync missing secrets
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          REQUIRED_SECRETS="REGISTRY_USERNAME REGISTRY_PASSWORD REGISTRY_EMAIL GIT_TOKEN POSTGRES_PASSWORD REDIS_PASSWORD RABBITMQ_PASSWORD KUBE_CONFIG"

          echo "🔍 Checking which deployment secrets exist..."
          EXISTING=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")

          MISSING=()
          for secret in $REQUIRED_SECRETS; do
            if echo "$EXISTING" | grep -qx "$secret"; then
              echo "  ✅ $secret"
            else
              echo "  ❌ $secret — missing"
              MISSING+=("$secret")
            fi
          done

          echo ""
          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "✅ All secrets already exist — skipping sync"
            echo "result=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          MISSING_LIST="${MISSING[*]}"
          echo "📊 ${#MISSING[@]} secret(s) need syncing: $MISSING_LIST"
          echo ""

          echo "🔄 Triggering devops-k8s/sync-secrets.yml..."
          gh workflow run sync-secrets.yml \
            --repo Bengo-Hub/devops-k8s \
            --ref main \
            -f target_repo="${{ github.repository }}" \
            -f secrets="$MISSING_LIST"

          echo "⏳ Waiting for secrets to be synced..."
          for i in $(seq 1 18); do
            sleep 10
            CURRENT=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")
            STILL_MISSING=0
            for secret in "${MISSING[@]}"; do
              echo "$CURRENT" | grep -qx "$secret" || STILL_MISSING=$((STILL_MISSING + 1))
            done
            if [ $STILL_MISSING -eq 0 ]; then
              echo "✅ All ${#MISSING[@]} secrets synced after $((i * 10))s"
              echo "result=synced" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  ⏳ ${STILL_MISSING} still missing ($((i * 10))s)..."
          done

          echo "⚠️ Timeout — some secrets may not have synced"
          echo "result=partial" >> $GITHUB_OUTPUT

  deploy:
    needs: sync-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install DevOps Tools
      uses: Bengo-Hub/devops-k8s/.github/actions/install-devops-tools@main

    - name: Set deployment variables
      run: |
        echo "DEPLOY=true" >> $GITHUB_ENV
        echo "SETUP_DATABASES=true" >> $GITHUB_ENV
        echo "DB_TYPES=postgres,redis,rabbitmq" >> $GITHUB_ENV
        echo "NAMESPACE=truload" >> $GITHUB_ENV
        echo "RABBITMQ_NAMESPACE=infra" >> $GITHUB_ENV
        echo "ENV_SECRET_NAME=truload-backend-env" >> $GITHUB_ENV
        echo "REGISTRY_SERVER=docker.io" >> $GITHUB_ENV
        echo "REGISTRY_NAMESPACE=codevertex" >> $GITHUB_ENV
        echo "VALUES_FILE_PATH=apps/truload-backend/values.yaml" >> $GITHUB_ENV
        echo "APP_NAME=truload-backend" >> $GITHUB_ENV

    - name: Verify secrets
      run: |
        echo "Verifying deployment secrets..."
        echo "Sync result: ${{ needs.sync-secrets.outputs.result }}"
        echo ""
        FAIL=0

        check_secret() {
          local name="$1" min_len="$2" value="$3"
          if [[ -z "$value" ]]; then
            echo "❌ $name — empty"
            FAIL=1
          elif [[ ${#value} -lt $min_len ]]; then
            echo "⚠️  $name — ${#value} chars (need >=$min_len)"
            FAIL=1
          else
            echo "✅ $name (${#value} chars)"
          fi
        }

        check_secret "REGISTRY_USERNAME"  5    "$REGISTRY_USERNAME"
        check_secret "REGISTRY_PASSWORD"  20   "$REGISTRY_PASSWORD"
        check_secret "KUBE_CONFIG"        1000 "$KUBE_CONFIG"
        check_secret "GIT_TOKEN"          20   "$GIT_TOKEN"
        check_secret "POSTGRES_PASSWORD"  8    "$POSTGRES_PASSWORD"
        check_secret "REDIS_PASSWORD"     8    "$REDIS_PASSWORD"

        if [[ $FAIL -eq 1 ]]; then
          echo ""
          echo "❌ Secret verification failed — re-run workflow if secrets were just synced"
          exit 1
        fi
        echo ""
        echo "✅ All secrets verified"
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

    - name: Debug available secrets
      run: |
        echo "Checking which tokens are available..."
        [[ -n "${{ secrets.GH_PAT }}" ]] && echo "✅ GH_PAT is set" || echo "❌ GH_PAT not found"
        [[ -n "${{ secrets.GIT_SECRET }}" ]] && echo "✅ GITHUB_SECRET is set" || echo "❌ GITHUB_SECRET not found"
        [[ -n "${{ secrets.GIT_TOKEN }}" ]] && echo "✅ GIT_TOKEN is set (default)" || echo "❌ GIT_TOKEN not found"

    - name: Run production deployment
      env:
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
        GIT_SECRET: ${{ secrets.GIT_SECRET }}
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        GITHUB_SHA: ${{ github.sha }}
        DEPLOY: true
        SETUP_DATABASES: true
        DB_TYPES: postgres,redis,rabbitmq
        NAMESPACE: truload
        RABBITMQ_NAMESPACE: infra
        ENV_SECRET_NAME: truload-backend-env
        REGISTRY_SERVER: docker.io
        REGISTRY_NAMESPACE: codevertex
        VALUES_FILE_PATH: apps/truload-backend/values.yaml
        APP_NAME: truload-backend
        GIT_USER: ${{ secrets.GIT_USER || 'TruLoad Bot' }}
        GIT_EMAIL: ${{ secrets.GIT_EMAIL || 'dev@truload.io' }}
        # Shared database passwords from INFRA namespace
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME || 'user' }}
        # .NET secrets
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        ASPNET_SECRET: ${{ secrets.ASPNET_SECRET }}
      run: |
        chmod +x build.sh
        # Export all required environment variables for build.sh and child scripts
        export POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
        export REDIS_PASSWORD="${REDIS_PASSWORD}"
        export RABBITMQ_PASSWORD="${RABBITMQ_PASSWORD}"
        export RABBITMQ_USERNAME="${RABBITMQ_USERNAME}"
        export RABBITMQ_NAMESPACE="${RABBITMQ_NAMESPACE}"
        export JWT_SECRET="${JWT_SECRET}"
        export ASPNET_SECRET="${ASPNET_SECRET}"
        export NAMESPACE="${NAMESPACE}"
        export ENV_SECRET_NAME="${ENV_SECRET_NAME}"
        export APP_NAME="${APP_NAME}"
        ./build.sh

    - name: Tag and push :latest
      if: success()
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      run: |
        set -e
        : "${REGISTRY_SERVER:=docker.io}"
        : "${REGISTRY_NAMESPACE:=codevertex}"
        IMAGE_REPO="${REGISTRY_SERVER}/${REGISTRY_NAMESPACE}/truload-backend"
        SHORT_SHA=${GITHUB_SHA::8}
        echo "Tagging ${IMAGE_REPO}:${SHORT_SHA} as :latest"
        echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_SERVER" -u "$REGISTRY_USERNAME" --password-stdin
        docker pull "${IMAGE_REPO}:${SHORT_SHA}" || true
        docker tag "${IMAGE_REPO}:${SHORT_SHA}" "${IMAGE_REPO}:latest"
        docker push "${IMAGE_REPO}:latest"

    - name: Check ArgoCD Application status
      if: success()
      env:
        KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        NS: truload
        APP_NAME: truload-backend
      run: |
        if [ -z "${KUBE_CONFIG_B64}" ]; then
          echo "⏭️ Skipping ArgoCD check - no KUBE_CONFIG available"
          exit 0
        fi
        
        echo "::group::ArgoCD Application Status"
        mkdir -p ~/.kube
        echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config
        
        # Note: ArgoCD applications are configured with automated sync
        # They will automatically detect git changes and sync when repository is updated
        echo "ℹ️ ArgoCD applications configured for automated sync - no manual intervention needed"
        
        # Check if ArgoCD Application exists and show its status
        if kubectl get application ${APP_NAME} -n argocd >/dev/null 2>&1; then
          echo "✓ ArgoCD Application '${APP_NAME}' found"
          
          # Trigger a hard refresh to detect values.yaml changes immediately
          kubectl patch application ${APP_NAME} -n argocd --type merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' || true
          
          # Show current status
          SYNC_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          HEALTH_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
          
          echo "Current Status - Sync: ${SYNC_STATUS}, Health: ${HEALTH_STATUS}"
          echo "✅ ArgoCD will automatically sync within a few moments"
          echo "📊 Monitor progress: kubectl get application ${APP_NAME} -n argocd -w"
        else
          echo "⚠️ ArgoCD Application '${APP_NAME}' not found"
          echo "📝 Action Required: Run the provision workflow to create ArgoCD Applications"
          echo ""
          echo "Run this command to trigger provisioning:"
          echo "  gh workflow run provision.yml --repo Bengo-Hub/devops-k8s"
          echo ""
          echo "Or manually apply the application:"
          echo "  kubectl apply -f https://raw.githubusercontent.com/Bengo-Hub/devops-k8s/main/apps/truload-backend/app.yaml"
          
          # Don't fail the workflow - application might not be set up yet
          echo ""
          echo "⚠️ Continuing without ArgoCD sync check (Application not found)"
        fi
        echo "::endgroup::"

    - name: Verify API health
      if: success()
      env:
        KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        NS: truload
      run: |
        if [ -z "${KUBE_CONFIG_B64}" ]; then
          echo "⏭️ Skipping health check - no KUBE_CONFIG available"
          exit 0
        fi

        echo "::group::Health check"
        mkdir -p ~/.kube
        echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config

        # Check if deployment exists before checking rollout status
        if kubectl get deployment truload-backend -n ${NS} >/dev/null 2>&1; then
          echo "✓ Deployment found, checking rollout status..."

          # Wait for deployment to be rolled out
          if kubectl rollout status deployment/truload-backend -n ${NS} --timeout=300s; then
            echo "✅ Deployment rollout successful"
            
            # Try ingress health endpoint
            HOSTS=$(kubectl get ingress -n ${NS} -o jsonpath='{.items[*].spec.rules[*].host}' | tr ' ' '\n' | grep -E '^truloadapitest' || true)
            if [ -n "$HOSTS" ]; then
              STATUS=1
              for H in $HOSTS; do
                echo "Checking https://$H/health ..."
                if curl -sk --max-time 10 "https://$H/health" | grep -Ei "healthy" >/dev/null; then
                  echo "✅ Health OK for $H"
                  STATUS=0
                  break
                fi
              done
              if [ $STATUS -ne 0 ]; then
                echo "⚠️ Health endpoint did not return OK; rollout completed but endpoint may still be initializing"
              fi
            else
              echo "No ingress host found; skipping external health probe"
            fi
          else
            echo "⚠️ Deployment rollout check timed out or failed"
            exit 1
          fi
        else
          echo "⚠️ Deployment not found yet - ArgoCD may still be syncing"
          echo "ℹ️ This is normal if the ArgoCD Application was just created"
          echo ""
          echo "Check ArgoCD sync status with:"
          echo "  kubectl get application truload-backend -n argocd"
          echo ""
          echo "Check deployment status with:"
          echo "  kubectl get deployment truload-backend -n ${NS}"
          echo ""
          echo "⚠️ Skipping health check (deployment not found)"
        fi
        echo "::endgroup::"
